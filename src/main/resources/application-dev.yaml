spring:
  application:
    name: microsaap

  datasource:
    url: jdbc:h2:mem:microsaap_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        use_sql_comments: true

  flyway:
    enabled: false

server:
  port: 8083

app:
  jwt:
    secret: devSecretKey1234567890abcdefghijklmnopqrstuvwxyz
    expiration: 86400000

logging:
  level:
    com.owlcode.microsaap: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.tool.schema: DEBUG
    org.hibernate.engine.jdbc.env.internal: DEBUG
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG
