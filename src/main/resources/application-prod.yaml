spring:
  web:
    resources:
      cache:
        period: 0
        cachecontrol:
          no-store: true
          must-revalidate: true

  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000
      maximum-pool-size: 5

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

logging:
  level:
    com.owlcode.microsaap: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO
    org.springframework.boot.context.embedded: INFO
    org.springframework.boot: INFO

